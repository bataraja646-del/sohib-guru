<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sohib Guru</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1f2a;
      color: white;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00c896;
      margin-top: 20px;
    }

    h2 {
      color: #ccc;
      margin-top: 20px;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 15px;
    }

    .card {
      background: #112f3d;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    #konten {
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #00c896;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>SOHIB GURU</h1>

<div class="menu">
  <div class="card">📘 Modul Ajar</div>
  <div class="card">📝 LKPD Sudut</div>
  <div class="card">📚 Materi</div>
  <div class="card">📊 Penilaian</div>
</div>

<h2 id="judul">Pilih Kelas</h2>
<div id="konten"></div>

<!-- DATA -->
<script src="data/data.js"></script>

<script>
const data = sohibGuru;
const konten = document.getElementById("konten");
const judul = document.getElementById("judul");


// ========================
// RENDER KELAS
// ========================
function renderKelas() {
  konten.innerHTML = "";
  judul.innerText = "Pilih Kelas";

  data.kelas.forEach(k => {
    const btn = document.createElement("button");
    btn.innerText = k.nama;

    btn.onclick = function() {
      localStorage.setItem("kelas", k.nama);
      renderSemester();
    };

    konten.appendChild(btn);
  });
}


// ========================
// RENDER SEMESTER
// ========================
function renderSemester() {
  konten.innerHTML = "";
  judul.innerText = "Pilih Semester";

  ["Ganjil", "Genap"].forEach(s => {
    const btn = document.createElement("button");
    btn.innerText = "Semester " + s;

    btn.onclick = function() {
      localStorage.setItem("semester", s);
      alert("Next: Mapel (Step berikutnya)");
    };

    konten.appendChild(btn);
  });
}


// ========================
// INIT
// ========================
renderKelas();

</script>

</body>
</html>
