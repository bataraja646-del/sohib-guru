<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sohib Guru</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1f2a;
      color: white;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #00c896;
      margin-top: 20px;
    }

    h2 {
      color: #ccc;
      margin-top: 20px;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 15px;
    }

    .card {
      background: #112f3d;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    .kelas-container {
      margin-top: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #00c896;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>SOHIB GURU</h1>

<div class="menu">
  <div class="card">📘 Modul Ajar</div>
  <div class="card">📝 LKPD Sudut</div>
  <div class="card">📚 Materi</div>
  <div class="card">📊 Penilaian</div>
</div>

<h2>Pilih Kelas</h2>

<div class="kelas-container" id="kelas"></div>

<!-- DATA -->
<script src="data/data.js"></script>

<script>
const data = sohibGuru;
const container = document.getElementById("kelas");

data.kelas.forEach(k => {
  const btn = document.createElement("button");
  btn.innerText = k.nama;

  btn.onclick = function() {
    localStorage.setItem("kelas", k.nama);
    window.location.href = "semester.html";
  };

  container.appendChild(btn);
});
</script>

</body>
</html>
