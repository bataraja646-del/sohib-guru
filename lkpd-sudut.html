<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LKPD Sudut</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 10px; background:#f5f7fa;">

<h1 style="font-size:40px; margin-bottom:20px;">📘 LKPD Sudut</h1>

<!-- SOAL 1 -->
<div style="background:#ffffff; padding:30px; border-radius:20px; margin-bottom:25px;">
  <p style="font-size:24px; font-weight:bold;">1. Sudut < 90° disebut?</p>

  <br>

  <button onclick="jawab(true,1)" style="
  width:100%;
  padding:18px;
  font-size:20px;
  margin-bottom:10px;
  border-radius:12px;
  ">
  Sudut Lancip
  </button>

  <button onclick="jawab(false,1)" style="
  width:100%;
  padding:18px;
  font-size:20px;
  border-radius:12px;
  ">
  Sudut Tumpul
  </button>
</div>

<!-- SOAL 2 -->
<div style="background:#ffffff; padding:30px; border-radius:20px;">
  <p style="font-size:24px; font-weight:bold;">2. Sudut siku-siku?</p>

  <br>

  <button onclick="jawab(true,2)" style="
  width:100%;
  padding:18px;
  font-size:20px;
  margin-bottom:10px;
  border-radius:12px;
  ">
  90°
  </button>

  <button onclick="jawab(false,2)" style="
  width:100%;
  padding:18px;
  font-size:20px;
  border-radius:12px;
  ">
  180°
  </button>
</div>

<br>

<!-- HASIL -->
<div id="hasil" style="
font-size:30px;
font-weight:bold;
margin-top:30px;
color:blue;
background:#e6f0ff;
padding:20px;
border-radius:15px;
">
📊 Skor kamu: 0 / 2
</div>

<br>

<!-- TOMBOL NILAI -->
<button onclick="lihatNilai()" style="
width:100%;
padding:18px;
background: green;
color: white;
border: none;
border-radius:15px;
font-size:20px;
margin-bottom:10px;
">
📊 Lihat Nilai
</button>

<!-- KEMBALI -->
<a href="index.html">
<button style="
width:100%;
padding:18px;
background: red;
color: white;
border: none;
border-radius:15px;
font-size:20px;
">
← Kembali
</button>
</a>

<script>
let skor = 0;
let sudah1 = false;
let sudah2 = false;

function jawab(benar, soal) {
  if ((soal === 1 && sudah1) || (soal === 2 && sudah2)) return;

  if (soal === 1) sudah1 = true;
  if (soal === 2) sudah2 = true;

  if (benar) {
    skor++;
  }

  document.getElementById("hasil").innerHTML = "📊 Skor kamu: " + skor + " / 2";
}

function lihatNilai() {
  document.getElementById("hasil").innerHTML = "📊 Skor kamu: " + skor + " / 2";
}
</script>

</body>
</html>
